<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart of Protection | Sovereign Advance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Use environment-provided configuration or fallback
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "", 
                authDomain: "heart-of-protection.firebaseapp.com",
                projectId: "heart-of-protection",
                storageBucket: "heart-of-protection.firebasestorage.app",
                messagingSenderId: "842507493379",
                appId: "1:842507493379:web:168cc286693b0a5e50ae36"
            };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'heart-of-protection';

        // Secure Authentication Flow
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Tactical Authentication Failed:", err);
            }
        };
        initAuth();

        // Feed Logic - Listen for new transmissions
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const leadsRef = collection(db, 'artifacts', appId, 'public', 'data', 'leads');
                onSnapshot(leadsRef, (snapshot) => {
                    const leads = snapshot.docs.map(doc => doc.data());
                    const list = document.getElementById('leads-list');
                    if (list) {
                        list.innerHTML = leads.reverse().map(l => `
                            <div class="p-4 border-b border-white/5 bg-white/5 mb-2 rounded border-l-2 border-red-600 transition-all hover:bg-white/10">
                                <p class="text-white font-bold text-sm tracking-wide">${l.name}</p>
                                <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">${l.timestamp || 'Active Signal'}</p>
                            </div>
                        `).join('') || '<p class="text-gray-600 italic p-4 text-center">Awaiting secure signal...</p>';
                    }
                }, (error) => console.error("Snapshot error:", error));
            }
        });

        // Form Logic - Submit to Command
        window.submitDossier = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "TRANSMITTING...";
            const formData = new FormData(e.target);
            try {
                if (!auth.currentUser) throw new Error("Not authenticated");
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'leads'), {
                    name: formData.get('name'),
                    email: formData.get('email'),
                    timestamp: new Date().toLocaleTimeString()
                });
                e.target.reset();
                btn.innerText = "SUCCESS";
                setTimeout(() => btn.innerText = originalText, 3000);
            } catch (err) {
                btn.innerText = "FAILED";
                console.error("Transmission Interrupted:", err);
            }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: #f0f0f0; }
        .cinzel { font-family: 'Cinzel', serif; }
        .gold-text { background: linear-gradient(135deg, #d4af37 0%, #f9e29b 50%, #d4af37 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: #450a0a; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen selection:bg-red-900 selection:text-white">
    <nav class="fixed w-full z-50 glass py-4 px-8 border-b border-white/5 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-red-900 rounded-full flex items-center justify-center border border-red-500 shadow-[0_0_10px_red]">
                <span class="cinzel text-lg font-bold text-white">H</span>
            </div>
            <span class="cinzel text-xs tracking-[0.4em] font-bold text-white uppercase hidden md:block">Heart of Protection</span>
        </div>
        <div class="text-[10px] tracking-widest text-red-500 animate-pulse uppercase font-bold">Tactical Link Established</div>
    </nav>

    <header class="pt-48 pb-20 px-6 text-center relative overflow-hidden">
        <div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-red-900 via-transparent to-transparent"></div>
        <h1 class="cinzel text-5xl md:text-7xl font-bold mb-4 gold-text tracking-tighter uppercase relative z-10">The Sovereign Advance</h1>
        <p class="text-gray-500 text-xs md:text-sm tracking-[0.6em] uppercase font-light relative z-10">Strategic Legacy & Life Defense</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12 grid grid-cols-1 lg:grid-cols-2 gap-12">
        <!-- Input Section -->
        <div class="glass p-8 rounded-xl shadow-2xl">
            <h2 class="cinzel text-xl text-red-500 mb-8 tracking-widest uppercase border-b border-red-900/30 pb-4">Initialize Dossier</h2>
            <form onsubmit="submitDossier(event)" class="space-y-6">
                <div>
                    <label class="text-[10px] text-gray-500 tracking-widest uppercase mb-2 block font-bold">Registry Name</label>
                    <input name="name" required class="w-full bg-white/5 border border-white/10 p-4 rounded text-white outline-none focus:border-red-500 transition-all" placeholder="Enter Full Name">
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 tracking-widest uppercase mb-2 block font-bold">Secure Email</label>
                    <input name="email" type="email" required class="w-full bg-white/5 border border-white/10 p-4 rounded text-white outline-none focus:border-red-500 transition-all" placeholder="Email for Transmission">
                </div>
                <button type="submit" class="w-full py-4 bg-red-950/40 border border-red-500 text-red-500 font-bold uppercase tracking-[0.3em] hover:bg-red-600 hover:text-white transition-all shadow-lg active:scale-[0.98]">Transmit to Command</button>
            </form>
        </div>

        <!-- Monitoring Section -->
        <div class="glass rounded-xl overflow-hidden flex flex-col h-[500px] shadow-2xl">
            <div class="p-4 border-b border-white/10 bg-red-950/10 flex justify-between items-center">
                <span class="cinzel text-[10px] tracking-widest text-red-500 font-bold uppercase">Apostolic Command Feed</span>
                <div class="flex items-center space-x-2">
                    <span class="text-[8px] text-gray-500 uppercase tracking-tighter">Live Monitor</span>
                    <span class="w-2 h-2 bg-red-500 rounded-full animate-ping"></span>
                </div>
            </div>
            <div id="leads-list" class="flex-grow overflow-y-auto p-4 space-y-2">
                <p class="p-8 text-center text-gray-700 italic text-sm">Synchronizing with secure orbital stream...</p>
            </div>
        </div>
    </main>

    <footer class="py-20 text-center border-t border-white/5 mt-20 opacity-30">
        <p class="cinzel text-[8px] tracking-[0.8em] uppercase">Protectorate Grade Security. Verified Sovereignty.</p>
    </footer>
</body>
</html>
